<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helix — Hardy-Weinberg Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="widget" id="widget">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Hardy-Weinberg Explorer</h1>
      <span class="badge live">live</span>
    </div>
    <div class="header-right">
      <span class="brand">Helix</span>
    </div>
  </div>

  <!-- Variant Selector -->
  <div class="variant-bar">
    <div class="preset-row">
      <button class="preset active" data-variant="rs334">HBB rs334 <small>Sickle Cell</small></button>
      <button class="preset" data-variant="rs1801133">MTHFR C677T</button>
      <button class="preset" data-variant="rs6025">Factor V Leiden</button>
      <button class="preset" data-variant="rs75961395">CFTR F508del</button>
      <button class="preset" data-variant="rs80357906">BRCA1 5382insC</button>
    </div>
    <div class="search-row">
      <input type="text" id="gene-search" placeholder="Search gene (e.g. TP53, BRCA2)..." autocomplete="off">
      <div class="autocomplete" id="autocomplete"></div>
    </div>
  </div>

  <!-- Variant Info -->
  <div class="variant-info" id="variant-info"></div>

  <!-- Population Tabs -->
  <div class="pop-tabs" id="pop-tabs"></div>

  <!-- Chart: Expected vs Observed -->
  <div class="chart-area">
    <svg id="hwe-chart" viewBox="0 0 500 200" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="stats-row"></div>

  <!-- Inbreeding Slider -->
  <div class="slider-row">
    <label>Inbreeding (F)
      <span class="val" id="f-val">0.00</span>
    </label>
    <input type="range" id="f-slider" min="0" max="0.5" step="0.005" value="0">
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>powered by <a href="https://github.com/schlein-lab/nano-zyrkel-helix" target="_blank">nano-zyrkel</a></span>
    <span class="embed-hint">embed: <code>?embed=true</code></span>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
