<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helix — Interactive Human Genetics</title>
    <meta name="description" content="Interactive Human Genetics Teaching Suite — real data, embeddable, powered by nano-zyrkel" />
    <link data-trunk rel="rust" data-wasm-opt="s" />
    <style>
        :root {
            --bg: #0a0e17;
            --bg-card: #111827;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #06b6d4;
            --accent-dim: #0e7490;
            --border: #1e293b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
            gap: 1rem;
        }
        #loading .helix-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading .label { color: var(--text-muted); font-size: 0.875rem; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="helix-spinner"></div>
        <div class="label">Loading Helix...</div>
    </div>
</body>
</html>
