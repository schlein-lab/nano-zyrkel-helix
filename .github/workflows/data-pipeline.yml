name: Helix Data Pipeline

# Pulls the central nano-zyrkel binary release pinned in
# .nano-zyrkel-versions.json, runs it against this repo's
# hats/config.json and commits the staging output. The actual fetch /
# parse / report logic lives in the central nano-zyrkel-core library.

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned binary version
        id: pin
        run: |
          set -e
          version=$(jq -r '.binary' .nano-zyrkel-versions.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download nano-zyrkel binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p core/bin
          gh release download "bin-${{ steps.pin.outputs.version }}" \
            --repo schlein-lab/nano-zyrkel \
            --pattern "nano-zyrkel-x86_64-unknown-linux-gnu.tar.gz" \
            --clobber \
            --output core/bin/nano-zyrkel.tar.gz
          tar -xzf core/bin/nano-zyrkel.tar.gz -C core/bin
          rm core/bin/nano-zyrkel.tar.gz
          chmod +x core/bin/nano-zyrkel

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: ./core/bin/nano-zyrkel --config hats/config.json --lang en

      - name: Commit results
        run: |
          git config user.name "nano-zyrkel"
          git config user.email "nano-zyrkel@users.noreply.github.com"
          git add staging/
          git diff --staged --quiet || \
            git commit -m "data: helix $(date -u +%Y-%m-%dT%H:%M)"
          git push || true
