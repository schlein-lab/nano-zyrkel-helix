name: "Data Pipeline"

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly Sunday 3 AM UTC
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to refresh: all | ensembl | gnomad | clinvar | cosmic | pharmgkb | quizzes'
        default: 'all'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Ensembl data
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'ensembl' || github.event_name == 'schedule' }}
        run: bash scripts/fetch_ensembl.sh
        continue-on-error: true

      - name: Fetch gnomAD data
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'gnomad' || github.event_name == 'schedule' }}
        run: bash scripts/fetch_gnomad.sh
        continue-on-error: true

      - name: Fetch ClinVar data
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'clinvar' || github.event_name == 'schedule' }}
        run: bash scripts/fetch_clinvar.sh
        continue-on-error: true

      - name: Fetch COSMIC data
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'cosmic' || github.event_name == 'schedule' }}
        run: bash scripts/fetch_cosmic.sh
        continue-on-error: true

      - name: Fetch PharmGKB data
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'pharmgkb' || github.event_name == 'schedule' }}
        run: bash scripts/fetch_pharmgkb.sh
        continue-on-error: true

      - name: Build indices
        run: bash scripts/build_indices.sh

      # Quiz generation via Codex CLI
      - name: Setup Node.js
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'quizzes' || github.event_name == 'schedule' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate quizzes (Codex CLI)
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'quizzes' || github.event_name == 'schedule' }}
        run: bash scripts/generate_quizzes.sh
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit data
        run: |
          git config user.name "nano-zyrkel"
          git config user.email "nano@zyrkel.local"
          git add staging/
          git diff --staged --quiet || \
            git commit -m "data: refresh $(date -u +%Y-%m-%d) [${SOURCE:-schedule}]"
          git push || true
        env:
          SOURCE: ${{ github.event.inputs.source }}
