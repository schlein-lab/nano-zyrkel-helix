name: "Deploy Web"

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            web/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('web/Cargo.lock') }}

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked || true

      - name: Build WASM
        working-directory: web
        run: wasm-pack build --target web --out-dir pkg --features wasm --no-default-features

      - name: Prepare pages
        run: |
          mkdir -p pages
          cp web/*.html web/*.js web/*.css web/*.png pages/ 2>/dev/null || true
          cp -r web/pkg pages/pkg
          if [ -d web/data ]; then cp -r web/data pages/data; fi
          if [ -d web/img ]; then cp -r web/img pages/img; fi
          if [ -d staging ]; then cp -r staging pages/staging; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
