name: CI

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            web/target
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('web/Cargo.lock') }}

      - name: Format check
        working-directory: web
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: web
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: Test (native, logic only)
        working-directory: web
        run: cargo test --lib
